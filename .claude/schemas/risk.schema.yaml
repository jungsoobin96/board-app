doc_type: risk
extends: _common
title_pattern: "^# .+ — Risk Register"
gate_value: operations

frontmatter:
  doc_type: { value: risk }
  gate: { value: operations }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0], 번호 제거
  - { heading: "## 1. 리스크 일람", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 2. 리스크 상세", required: true, severity: BLOCK }
  - { heading: "## 3. High 리스크 단계적 롤아웃", required: true, severity: BLOCK }

tables:
  - in_section: "## 1. 리스크 일람"
    columns: [RISK-ID, 제목, "영향(1~5)", "가능성(1~5)", 등급, "영향 받는 Sprint/Issue", 대응]
    severity: BLOCK

subsection_patterns:
  - parent: "## 2. 리스크 상세"
    pattern: "^### RISK-[0-9]{2,}: .+$"
    severity: BLOCK

per_risk_must_contain:
  in_subsection_pattern: "^### RISK-[0-9]{2,}"
  must_contain:
    - { label: "카테고리", pattern: "(기술|일정|외부 의존|보안|운영)", severity: BLOCK }
    - { label: "설명", required: true, severity: BLOCK }
    - { label: "영향", required: true, severity: BLOCK }
    - { label: "가능성", required: true, severity: BLOCK }
    - { label: "현재 상태", pattern: "(식별|모니터링|완화 진행|발생|해소)", severity: BLOCK }
    - { label: "트리거 신호", required: true, severity: WARN }
    - { label: "완화 전략", required: true, severity: BLOCK }
    - { label: "대응 이슈", required: true, severity: WARN }

id_required:
  - RISK-ID
