doc_type: screen-design
extends: _common
title_pattern: "^# .+ — Screen Design \\(LLD — UI\\)"
gate_value: C

frontmatter:
  doc_type: { value: screen-design }
  gate: { value: C }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0]
  - { heading: "## 1. 화면 인벤토리", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 2. 화면 상세", required: true, severity: BLOCK }
  # ADR-0038: §3 INFO → BLOCK 격상. 디자인 의도(토큰)와 구현(12-scaffolding §8 styling 솔루션)의 schema-level 연결
  - { heading: "## 3. 디자인 시스템 / 토큰", required: true, severity: BLOCK }
  - { heading: "## 4. 접근성", required: true, severity: WARN }
  - { heading: "## 5. Open Questions", required: false, severity: INFO }

# ADR-0038: §3 토큰 정의 필수 하위 항목 — 12-scaffolding §8 매핑 표가 본 토큰을 인용
design_tokens_must_contain:
  in_section: "## 3. 디자인 시스템 / 토큰"
  must_contain:
    - { label: "Color", required: true, severity: BLOCK, description: "primary·secondary·neutral 최소 3종" }
    - { label: "Typography", required: true, severity: BLOCK, description: "font-family + scale 최소 3단" }
    - { label: "Spacing", required: true, severity: BLOCK, description: "spacing scale 최소 4단" }
    - { label: "Component primitives", required: true, severity: BLOCK, description: "Button·Input·Card 등 최소 3종, 상태 variant 포함" }

tables:
  - in_section: "## 1. 화면 인벤토리"
    columns: [ID, 화면명, "진입 트리거", "F-ID 매핑"]
    severity: BLOCK

subsection_patterns:
  - parent: "## 2. 화면 상세"
    pattern: "^### S-[0-9]{2,}: .+$"
    severity: BLOCK

per_screen_must_contain:
  in_subsection_pattern: "^### S-[0-9]{2,}"
  must_contain:
    - { label: "목적", required: true, severity: BLOCK }
    - { label: "상태", required: true, severity: BLOCK }
    - { label: "F-ID 매핑", pattern: "F-", severity: BLOCK }

id_required:
  - F-ID
