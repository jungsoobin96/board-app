doc_type: retro
extends: _common
title_pattern: "^# Sprint [0-9]+ Retrospective$"
gate_value: operations
filename_pattern: "^sprint-[0-9]+\\.md$"
location: "docs/planning/retro/"

frontmatter:
  doc_type: { value: retro }
  gate: { value: operations }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0], 번호 제거
  - { heading: "## 0. 메타", required: true, severity: BLOCK }
  - { heading: "## 1. 잘 된 점 (Keep)", required: true, severity: BLOCK }
  - { heading: "## 2. 아쉬운 점 (Problem)", required: true, severity: BLOCK }
  - { heading: "## 3. 시도할 것 (Try)", required: true, severity: BLOCK }
  - { heading: "## 4. carryover 이슈", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 5. 신규 발견 이슈", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 6. 우선순위·일정 보정", required: true, severity: WARN }
  - { heading: "## 7. ADR / PLAN 갱신 항목", required: true, severity: WARN }

meta_must_contain:
  in_section: "## 0. 메타"
  must_contain:
    - { label: "Sprint", pattern: "[0-9]+", severity: BLOCK }
    - { label: "기간", pattern: "[0-9]{4}-[0-9]{2}-[0-9]{2}", severity: BLOCK }
    - { label: "이슈 결과", required: true, severity: WARN }

tables:
  - in_section: "## 4. carryover 이슈"
    columns: [Issue, 사유, "다음 스프린트 우선순위"]
    severity: BLOCK
  - in_section: "## 5. 신규 발견 이슈"
    columns: [패턴, Issue, 처리]
    severity: BLOCK
    description: "ADR-0008 3축 OX 분류 (A. Derived / B. Blocker / C. Bug)"
