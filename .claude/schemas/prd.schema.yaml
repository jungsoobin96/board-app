doc_type: prd
extends: _common
title_pattern: "^# .+ — PRD"
gate_value: B

frontmatter:
  doc_type: { value: prd }
  gate: { value: B }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0]
  - { heading: "## 1. 제품 개요", required: true, severity: BLOCK }
  - { heading: "## 2. 사용자 가치", required: true, severity: BLOCK }
  - { heading: "## 3. 기능", required: true, severity: BLOCK }
  - { heading: "## 4. MVP Cut 요약", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 5. UX 원칙 / 화면 구성 큰 그림", required: true, severity: WARN }
  - { heading: "## 6. 의존성 / 외부 시스템", required: true, severity: WARN }
  - { heading: "## 7. Open Questions", required: false, severity: INFO }

subsection_patterns:
  - parent: "## 3. 기능"
    pattern: "^### F-[0-9]{2,}: .+$"
    severity: BLOCK

per_feature_must_contain:
  in_subsection_pattern: "^### F-[0-9]{2,}"
  must_contain:
    - { label: "MVP Cut", pattern: "(포함|제외|✅|❌)", severity: BLOCK }
    - { label: "우선순위", pattern: "P[0-3]", severity: BLOCK }
    - { label: "사용자 스토리", pattern: "As a", severity: BLOCK }
    - { label: "Acceptance", pattern: "Given.+When.+Then", severity: BLOCK }
    - { label: "R-ID 매핑", pattern: "R-", severity: BLOCK }
    - { label: "테스트 시나리오", pattern: "테스트 시나리오", severity: BLOCK, description: "F-ID별 검증 시나리오 — 12 Test Design fan-in 대상 (ADR-0003 §2.4, v0.7.8 MUST)" }
    # ADR-0023 — 단위·통합·E2E 3축 모두 명시적 결정 강제. 각 레벨에 대해 ✅(적용) 또는 N/A(부적합) 명시.
    - { label: "단위 테스트 결정", pattern: "단위[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — 단위 테스트 적용 여부 명시 (예: '단위: ✅' 또는 '단위: N/A')" }
    - { label: "통합 테스트 결정", pattern: "통합[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — 통합 테스트 적용 여부 명시" }
    - { label: "E2E 테스트 결정", pattern: "E2E[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — E2E 테스트 적용 여부 명시 (BE-only F-ID는 N/A 권고)" }
    - { label: "Happy path", pattern: "(정상|성공|happy|Happy)", severity: BLOCK, description: "ADR-0014 §2.2 — 정상 흐름 시나리오 1건 이상" }
    - { label: "Failure path", pattern: "(실패|에러|거부|예외|fail|Fail|error|Error)", severity: BLOCK, description: "ADR-0014 §2.2 — 실패·예외 흐름 시나리오 1건 이상" }

tables:
  - in_section: "## 4. MVP Cut 요약"
    columns: [F-ID, MVP, 비고]
    severity: BLOCK

# ADR-0015 §2.3 (v1.1) — 상류 schema 정합. F-XX 본문·Acceptance·테스트
# 시나리오에 커버리지 < 80% 정량 금지. 같은 줄에 키워드와 값이 함께
# 등장하면 BLOCK. 분야별 예외는 ADR 신설로 명시.
forbidden_patterns:
  - label: "커버리지 < 80% 금지 (ADR-0015 §2.3)"
    pattern: "(커버리지|[Cc]overage).{0,200}[<≤=≥>]?[[:space:]]*[1-7][0-9][[:space:]]*%"
    severity: BLOCK
    description: "05-prd F-XX 기능에 커버리지 < 80% 정량 금지. ≥80% 또는 ADR로 예외 명시"

id_required:
  - F-ID
  - R-ID
