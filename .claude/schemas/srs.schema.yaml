doc_type: srs
extends: _common
title_pattern: "^# .+ — SRS"
gate_value: B

frontmatter:
  doc_type: { value: srs }
  gate: { value: B }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0], 번호 제거. Open Questions §7 → §6 재번호
  - { heading: "## 1. 범위 / 가정", required: true, severity: BLOCK }
  - { heading: "## 2. 기능 요구사항", required: true, severity: BLOCK }
  - { heading: "## 3. 비기능 요구사항", required: true, severity: BLOCK }
  - { heading: "## 4. 인터페이스 요구사항", required: true, severity: WARN }
  - { heading: "## 5. 도메인 모델", required: false, severity: INFO }
  - { heading: "## 6. Open Questions", required: false, severity: INFO }

subsection_patterns:
  - parent: "## 2. 기능 요구사항"
    pattern: "^### R-F-[0-9]{2,}: .+$"
    severity: BLOCK
  - parent: "## 3. 비기능 요구사항"
    pattern: "^### R-N-[0-9]{2,}"
    severity: BLOCK

per_requirement_must_contain:
  in_subsection_pattern: "^### R-[A-Z]+-[0-9]{2,}"
  must_contain:
    - { label: "우선순위", pattern: "P[0-3]", severity: BLOCK }
    - { label: "Acceptance", pattern: "Given.+When.+Then", severity: BLOCK }
    - { label: "테스트 시나리오", pattern: "테스트 시나리오", severity: BLOCK, description: "R-ID별 검증 시나리오 — 12 Test Design fan-in 대상 (ADR-0003 §2.4, v0.7.8 MUST)" }
    # ADR-0023 — 단위·통합·E2E 3축 모두 명시적 결정 강제. 각 레벨에 대해 ✅(적용) 또는 N/A(부적합) 명시.
    - { label: "단위 테스트 결정", pattern: "단위[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — 단위 테스트 적용 여부 명시 (예: '단위: ✅' 또는 '단위: N/A'). ❌(미작성) 금지" }
    - { label: "통합 테스트 결정", pattern: "통합[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — 통합 테스트 적용 여부 명시" }
    - { label: "E2E 테스트 결정", pattern: "E2E[[:blank:]]*[:：][[:blank:]]*[^|]*(✅|N/A|N-A|적용|미적용|해당없음)", severity: BLOCK, description: "ADR-0023 — E2E 테스트 적용 여부 명시 (UI 없는 BE-only R-ID는 N/A 권고)" }
    - { label: "Happy path", pattern: "(정상|성공|happy|Happy)", severity: BLOCK, description: "ADR-0014 §2.2 — 정상 흐름 시나리오 1건 이상 필수" }
    - { label: "Failure path", pattern: "(실패|에러|거부|예외|fail|Fail|error|Error)", severity: BLOCK, description: "ADR-0014 §2.2 — 실패·예외 흐름 시나리오 1건 이상 필수 (AI 게이트가 검증할 수 있도록)" }

# ADR-0015 §2.3 (v1.1) — 상류 schema 정합. R-XX(특히 R-N-XX 비기능 요구사항)
# Acceptance·실패 케이스에 커버리지 < 80% 정량 금지. 같은 줄에 키워드와
# 값이 함께 등장하면 BLOCK. 분야별 예외는 ADR 신설로 명시.
forbidden_patterns:
  - label: "커버리지 < 80% 금지 (ADR-0015 §2.3)"
    pattern: "(커버리지|[Cc]overage).{0,200}[<≤=≥>]?[[:space:]]*[1-7][0-9][[:space:]]*%"
    severity: BLOCK
    description: "04-srs R-XX 요구사항에 커버리지 < 80% 정량 금지. ≥80% 또는 ADR로 예외 명시"

id_required:
  - R-ID
