doc_type: wbs
extends: _common
title_pattern: "^# .+ — WBS"
gate_value: operations

frontmatter:
  doc_type: { value: wbs }
  gate: { value: operations }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0]
  - { heading: "## 0. 개요", required: true, severity: BLOCK }
  - { heading: "## 1. 스프린트 일람", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 2. 스프린트 상세", required: true, severity: BLOCK }
  - { heading: "## 3. 의존성 그래프", required: true, severity: BLOCK }
  - { heading: "## 4. 추적성 매트릭스", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 5. 리스크 매핑", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 6. 일정", required: true, severity: WARN }
  - { heading: "## 7. sprint-bootstrap 입력", required: true, severity: BLOCK, must_contain_codeblock: true }
  - { heading: "## 8. Open Questions", required: false, severity: INFO }

tables:
  - in_section: "## 1. 스프린트 일람"
    columns: [Sprint, 기간, "목표(Outcome)", "주요 R-ID/F-ID", "이슈 수"]
    severity: BLOCK
  - in_section: "## 4. 추적성 매트릭스"
    columns: [R-ID, F-ID, Sprint, "Issue Slug"]
    severity: BLOCK
  - in_section: "## 5. 리스크 매핑"
    columns: ["15-risk Risk-ID", "영향 받는 Sprint/Issue", "대응 이슈"]
    severity: WARN

subsection_patterns:
  - parent: "## 2. 스프린트 상세"
    pattern: "^### Sprint [0-9]+"
    severity: BLOCK

per_issue_must_contain:
  in_subsection_pattern: "^##### Issue: "
  must_contain:
    - { label: "유형", pattern: "(feature|bug|chore|docs|test)", severity: BLOCK }
    - { label: "영역", pattern: "(frontend|backend|agent|infra|docs)", severity: BLOCK }
    - { label: "우선순위", pattern: "P[0-3]", severity: BLOCK }
    - { label: "Estimated Effort", pattern: "(0\\.5|1|2|3)d", severity: BLOCK }
    - { label: "Acceptance Criteria", pattern: "Given.+When.+Then", severity: BLOCK }
    - { label: "Contract Before", required: true, severity: BLOCK }
    - { label: "Contract.*After", required: true, severity: BLOCK }
    - { label: "DoD Checklist", required: true, severity: BLOCK }

sprint_bootstrap_yaml_must_contain:
  in_section: "## 7. sprint-bootstrap 입력"
  must_contain_keys:
    - "sprints:"
    - "project:"
  severity: BLOCK
  # ADR-0045 §2.3 — issues[].body 직렬화 강제. §2 11필드 → §7 body 13블록 미러링.
  # body_must_contain은 §7 코드블록 *내부*에서 다음 키워드가 모두 등장해야 함을 선언.
  # 현 validate-doc.sh는 본 키 직접 처리 분기 미보유 — wbs.md command가 LLM 자체 강제
  # (BLOCKED 케이스 표 "BLOCKED: §7 body 11필드 미러링 누락"). 후속 ADR에서 검증
  # 자동화 격상 검토(도입 사례 ≥ 2건 + 누락 빈도 ≥ 10% 시).
  body_must_contain:
    - "## 매핑"
    - "R-ID:"
    - "F-ID:"
    - "## 유형 / 영역 / 우선순위"
    - "Estimated Effort"
    - "## Acceptance Criteria"
    - "Given.+When.+Then"
    - "## Contract"
    - "변경 전:"
    - "변경 후:"
    - "## DoD Checklist"
    - "## 테스트 시나리오"
    - "## 의존성"
    - "Blocked-by:"
    - "Blocks:"
    # ADR-0045 v1.1 — footer placeholder. sprint-bootstrap.sh가 등록 직전
    # `gh repo view`로 절대 URL 추출·치환. LLM은 `{{WBS_URL}}` 그대로 작성.
    - "\\{\\{WBS_URL\\}\\}"

# ADR-0045 v1.1 §2.3 — 이슈 본문에 LLM 직접 작성 WBS.md 링크 금지.
# v1.1: `{{WBS_URL}}` placeholder는 토큰 매칭에서 자연 통과(docs/planning·13-wbs.md·
# github.com 직접 포함 안 함). sprint-bootstrap.sh가 등록 직전에 `gh repo view`로
# 추출·치환하므로 LLM은 placeholder만 작성하면 됨. 직접 작성한 markdown link 형식
# (`](...wbs...)`)만 차단 — 본문 평문 언급도 허용. ADR-0015 v1.1 forbidden_patterns
# 메커니즘 재사용.
forbidden_patterns:
  - label: "WBS.md 링크 임베드 금지 — 상대 경로 (ADR-0045)"
    pattern: '\]\([^)]*docs/planning[^)]*wbs[^)]*\)'
    severity: BLOCK
    description: "이슈 본문에 `[..](docs/planning/.../wbs...)` 형태 링크 금지. R-ID/F-ID로 상류 추적"
  - label: "WBS.md 링크 임베드 금지 — 파일명 직접 (ADR-0045)"
    pattern: '\]\([^)]*13-wbs\.md[^)]*\)'
    severity: BLOCK
    description: "이슈 본문에 `[..](...13-wbs.md...)` 형태 링크 금지. R-ID/F-ID로 상류 추적"
  - label: "WBS.md 링크 임베드 금지 — 절대 URL (ADR-0045)"
    pattern: '\]\([^)]*github\.com[^)]*blob[^)]*wbs[^)]*\)'
    severity: BLOCK
    description: "이슈 본문에 GitHub blob 절대 URL 형태 WBS 링크 금지. R-ID/F-ID로 상류 추적"

id_required:
  - R-ID
  - F-ID
  - Sprint
