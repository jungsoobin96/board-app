doc_type: brief
extends: _common
title_pattern: "^# .+ — Project Brief$"
gate_value: A

frontmatter:
  doc_type: { value: brief }
  gate: { value: A }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0]
  - { heading: "## 1. 한 줄 정의", required: true, severity: BLOCK }
  - { heading: "## 2. 배경 / 문제 정의", required: true, severity: BLOCK }
  - { heading: "## 3. 핵심 사용자 / 이해관계자", required: true, severity: BLOCK }
  - { heading: "## 4. 목표 (성공 정의)", required: true, severity: BLOCK, must_contain_table: true }
  - { heading: "## 5. 비목표 (Out of Scope)", required: true, severity: BLOCK }
  - { heading: "## 6. 일정 (대략)", required: true, severity: WARN }
  - { heading: "## 7. 리스크 (초기 식별)", required: true, severity: WARN }
  - { heading: "## 8. Open Questions", required: false, severity: INFO }

tables:
  - in_section: "## 4. 목표 (성공 정의)"
    columns: [KPI, "측정 방법", 목표값, "달성 시점"]
    severity: BLOCK

# ADR-0015 §2.3 (v1.1) — 상류 schema 정합. 커버리지/coverage 정량값은
# ≥80%만 허용. 같은 줄에 "커버리지|coverage" 키워드와 [1-7][0-9]% 값이
# 함께 등장하면 BLOCK. 분야별 예외(예: 레거시 50%)는 ADR 신설로 명시.
forbidden_patterns:
  - label: "커버리지 < 80% 금지 (ADR-0015 §2.3)"
    pattern: "(커버리지|[Cc]overage).{0,200}[<≤=≥>]?[[:space:]]*[1-7][0-9][[:space:]]*%"
    severity: BLOCK
    description: "01-project-brief KPI에 커버리지 < 80% 정량 금지. ≥80% 또는 ADR로 예외 명시"
