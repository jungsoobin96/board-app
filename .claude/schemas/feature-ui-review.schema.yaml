doc_type: feature-ui-review
extends: _common
title_pattern: "^# .+ — UI Design Review"
gate_value: feature
filename_pattern: "^(feat|mod|bug|design)-[a-z0-9-]+\\.ui-review\\.md$"

frontmatter:
  doc_type: { value: feature-ui-review }
  gate: { value: feature }

sections:
  - { heading: "## 변경 이력", required: true, severity: BLOCK }              # ADR-0019 — sections[0]
  - { heading: "## 0. Verdict", required: true, severity: BLOCK }
  - { heading: "## 1. 단일 화면 검토", required: true, severity: BLOCK }
  - { heading: "## 2. 시스템 일관성 검토", required: false, severity: INFO }
  - { heading: "## 3. 스크린샷 (Before / After)", required: true, severity: WARN }
  - { heading: "## 4. NEEDS-WORK 항목", required: false, severity: INFO }

verdict_must_contain:
  in_section: "## 0. Verdict"
  must_contain:
    - { label: "verdict", pattern: "(PASS|NEEDS-WORK|FAIL)", severity: BLOCK }
    - { label: "mode", pattern: "(default|--consistency)", severity: BLOCK }

per_screen_must_contain:
  in_subsection_pattern: "^### S-[0-9]{2,}"
  must_contain:
    - { label: "목적 부합", pattern: "(✅|❌)", severity: BLOCK }
    - { label: "상태별 표출", pattern: "(loading|empty|loaded|error)", severity: BLOCK }
    - { label: "반응형", required: true, severity: WARN }
    - { label: "접근성", required: true, severity: WARN }
    # ADR-0038: 디자인 토큰 적용 — 10-lld-screen-design §3 정의 토큰이 실제 컴포넌트에 적용됐는지
    - { label: "디자인 토큰 적용", pattern: "(✅|❌)", severity: BLOCK, description: "ADR-0038 — 컬러·타이포·spacing·primitive variant 중 1개 이상 토큰 인용 적용" }
