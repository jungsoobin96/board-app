name: Derived Issue (파생 이슈)
description: 작업/검증 중 발견된 파생 이슈 (Origin 약한 추적)
title: "<type>(<area>): <summary>"
labels: ["derived", "status:todo"]
body:
  - type: markdown
    attributes:
      value: |
        > **파생 이슈** (ADR-0008 + ADR-0021).
        > 3가지 패턴(A. Derived / B. Blocker / C. Bug) 중 하나 + **Origin 블록 필수**.
        > 가이드: [`docs/install/github-issue-guide.md`](../docs/install/github-issue-guide.md) §4.

  - type: textarea
    id: origin
    attributes:
      label: Origin (필수)
      description: 파생 출처 — 약한 추적 (부모 close 영향 없음, 검색 가능)
      value: |
        | Field | Value |
        |---|---|
        | Discovered-in | PR #?? (또는 Issue #??, code-review 보고서 경로) |
        | Discovered-by | /code-review (또는 /qa-test --ai, /risk-check, 휴먼 PR 리뷰, 자가 발견) |
        | Discovered-at | YYYY-MM-DDTHH:MM:SS KST |
        | Pattern | A. Derived (또는 B. Blocker, C. Bug) |
        | 3-axis OX | in_scope=F / blocks_parent_merge=F / same_area=F |
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] AC-01:
    validations:
      required: true

  - type: textarea
    id: contract
    attributes:
      label: Contract Before / After
      value: |
        - Before:
        - After:
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - 0.5d
        - 1d
        - 2d
        - 3d
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: DoD Checklist
      value: |
        - [ ] 코드 작성
        - [ ] 테스트 통과
        - [ ] PR 머지
    validations:
      required: true
